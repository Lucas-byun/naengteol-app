<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#E8652A">
<title>냉털 — 오프라인</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:#FAF6F2;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:24px;
    text-align:center;
  }
  .icon{
    width:96px;
    height:96px;
    border-radius:22px;
    margin-bottom:20px;
    box-shadow:0 4px 16px rgba(0,0,0,.12);
  }
  .title{
    font-size:20px;
    font-weight:800;
    color:#E8652A;
    margin-bottom:8px;
  }
  .sub{
    font-size:15px;
    color:#888;
    line-height:1.7;
    margin-bottom:32px;
  }
  .emoji{
    font-size:64px;
    margin-bottom:20px;
    display:block;
  }
  .btn{
    display:inline-block;
    padding:14px 32px;
    background:#E8652A;
    color:#fff;
    border:none;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    text-decoration:none;
    box-shadow:0 2px 8px rgba(232,101,42,.3);
  }
  .btn:active{opacity:.85}
  .tip{
    margin-top:24px;
    font-size:12px;
    color:#bbb;
    line-height:1.6;
  }
</style>
</head>
<body>
  <img src="icons/app_icon_192.png" alt="냉털" class="icon" onerror="this.style.display='none';document.getElementById('fallback-emoji').style.display='block'">
  <span id="fallback-emoji" style="display:none" class="emoji">🍳</span>
  <div class="title">인터넷 연결이 없어요</div>
  <div class="sub">
    오프라인 상태입니다.<br>
    인터넷에 연결한 후 다시 시도해 주세요.
  </div>
  <button class="btn" onclick="location.reload()">🔄 다시 시도</button>
  <div class="tip">
    한 번 접속한 적 있다면<br>
    인터넷 없이도 냉털을 사용할 수 있어요.
  </div>
</body>
</html>
